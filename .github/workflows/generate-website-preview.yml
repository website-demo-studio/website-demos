name: Generate polished website email preview

on:
  push:
    branches:
      - main
    paths:
      - "docs/*/*/index.html"

  workflow_dispatch:
    inputs:
      category:
        description: "Website category"
        required: true
        type: choice
        options:
          - clinics
          - restaurants
          - spas
          - salons
          - other

      slug:
        description: "Published website slug"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: website-preview-main
  cancel-in-progress: false

jobs:
  generate-preview:
    name: Generate polished email preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Determine website files
        id: targets
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            files="docs/${{ inputs.category }}/${{ inputs.slug }}/index.html"

            if [[ ! -f "$files" ]]; then
              echo "Website file not found: $files"
              exit 1
            fi
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              files="$(
                git show --pretty="" --name-only "$after" |
                grep -E '^docs/[^/]+/[^/]+/index\.html$' || true
              )"
            else
              files="$(
                git diff --name-only "$before" "$after" |
                grep -E '^docs/[^/]+/[^/]+/index\.html$' || true
              )"
            fi
          fi

          if [[ -z "${files:-}" ]]; then
            echo "No website index files require screenshots."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Playwright, Chromium and Sharp
        if: steps.targets.outputs.files != ''
        shell: bash
        run: |
          npm install --no-save --no-package-lock playwright@1 sharp@0.34
          npx playwright install --with-deps chromium

      - name: Start local website server
        if: steps.targets.outputs.files != ''
        shell: bash
        run: |
          python3 -m http.server 8000 --directory docs > /tmp/preview-server.log 2>&1 &

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ > /dev/null; then
              echo "Local website server is ready."
              exit 0
            fi

            sleep 1
          done

          cat /tmp/preview-server.log
          exit 1

      - name: Create polished preview collage
        if: steps.targets.outputs.files != ''
        shell: bash
        env:
          TARGET_FILES: ${{ steps.targets.outputs.files }}
        run: |
          cat > "$GITHUB_WORKSPACE/capture-preview.cjs" <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const { chromium } = require("playwright");
          const sharp = require("sharp");

          const VIEWPORT_WIDTH = 1440;
          const VIEWPORT_HEIGHT = 900;
          const GAP = 22;

          function clamp(value, minimum, maximum) {
            return Math.max(minimum, Math.min(value, maximum));
          }

          async function crop(buffer, left, top, width, height) {
            return sharp(buffer)
              .extract({ left, top, width, height })
              .jpeg({ quality: 89, mozjpeg: true })
              .toBuffer();
          }

          async function buildPreview(fullPageBuffer, outputFile) {
            const metadata = await sharp(fullPageBuffer).metadata();
            const width = metadata.width;
            const height = metadata.height;

            if (!width || !height) {
              throw new Error("Unable to read the captured page dimensions.");
            }

            const panels = [];

            const topHeight = Math.min(680, height);
            panels.push({
              buffer: await crop(fullPageBuffer, 0, 0, width, topHeight),
              height: topHeight
            });

            if (height > 900) {
              const middleHeight = Math.min(420, height);
              const middleTop = clamp(
                Math.round(height * 0.42),
                0,
                height - middleHeight
              );

              panels.push({
                buffer: await crop(
                  fullPageBuffer,
                  0,
                  middleTop,
                  width,
                  middleHeight
                ),
                height: middleHeight
              });
            }

            if (height > 1500) {
              const bottomHeight = Math.min(340, height);
              const bottomTop = height - bottomHeight;

              panels.push({
                buffer: await crop(
                  fullPageBuffer,
                  0,
                  bottomTop,
                  width,
                  bottomHeight
                ),
                height: bottomHeight
              });
            }

            const totalHeight =
              panels.reduce((sum, panel) => sum + panel.height, 0) +
              GAP * (panels.length - 1);

            const composites = [];
            let currentTop = 0;

            for (const panel of panels) {
              composites.push({
                input: panel.buffer,
                left: 0,
                top: currentTop
              });

              currentTop += panel.height + GAP;
            }

            await sharp({
              create: {
                width,
                height: totalHeight,
                channels: 3,
                background: "#f3f1ec"
              }
            })
              .composite(composites)
              .jpeg({ quality: 88, mozjpeg: true })
              .toFile(outputFile);
          }

          async function main() {
            const files = String(process.env.TARGET_FILES || "")
              .split(/\r?\n/)
              .map((value) => value.trim())
              .filter(Boolean);

            if (files.length === 0) {
              return;
            }

            const browser = await chromium.launch({ headless: true });

            try {
              for (const file of files) {
                if (!fs.existsSync(file)) {
                  throw new Error(`Website file does not exist: ${file}`);
                }

                const websiteDirectory = path.dirname(file);
                const relativeDirectory = websiteDirectory
                  .replace(/^docs[\\/]/, "")
                  .split(path.sep)
                  .map(encodeURIComponent)
                  .join("/");

                const pageUrl =
                  `http://127.0.0.1:8000/${relativeDirectory}/`;

                const outputFile = path.join(
                  websiteDirectory,
                  "preview-email.jpg"
                );

                const page = await browser.newPage({
                  viewport: {
                    width: VIEWPORT_WIDTH,
                    height: VIEWPORT_HEIGHT
                  },
                  deviceScaleFactor: 1
                });

                await page.emulateMedia({ media: "screen" });

                await page.goto(pageUrl, {
                  waitUntil: "domcontentloaded",
                  timeout: 30000
                });

                await page
                  .waitForLoadState("networkidle", { timeout: 6000 })
                  .catch(() => {});

                await page
                  .waitForFunction(
                    () =>
                      Array.from(document.images).every(
                        (image) => image.complete
                      ),
                    null,
                    { timeout: 6000 }
                  )
                  .catch(() => {});

                await page
                  .evaluate(() => document.fonts && document.fonts.ready)
                  .catch(() => {});

                await page.waitForTimeout(1200);

                const fullPageBuffer = await page.screenshot({
                  type: "png",
                  fullPage: true
                });

                await buildPreview(fullPageBuffer, outputFile);
                await page.close();

                console.log(`Created polished preview: ${outputFile}`);
              }
            } finally {
              await browser.close();
            }
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          node "$GITHUB_WORKSPACE/capture-preview.cjs"

      - name: Commit generated previews
        if: steps.targets.outputs.files != ''
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            git add -- "$file"
          done < <(
            find docs -type f -name "preview-email.jpg" -print0
          )

          if git diff --cached --quiet; then
            echo "No preview changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "Generate polished website email preview"
          git pull --rebase origin main
          git push origin HEAD:main
