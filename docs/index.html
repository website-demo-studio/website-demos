<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Website Demo Gallery</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f3ef; color: #1e1e1e; }
    main { width: min(720px, calc(100% - 40px)); padding: 64px 0; }
    p { color: #5a5a5a; line-height: 1.7; }
    code { background: #e9e5de; padding: 3px 7px; border-radius: 6px; }
  </style>
</head>
<body>
  <main>
    <p>Private website preview system</p>
    <h1>Website Demo Gallery</h1>
    <p>Published clinic prototypes will appear at URLs such as <code>/clinic-name/</code>.</p>
  </main>
</body>
</html>
